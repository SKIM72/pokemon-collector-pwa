name: Index card images

on:
  workflow_dispatch:
    inputs:
      language:
        description: Card language
        required: true
        type: choice
        options:
          - ja
          - ko
          - en
        default: ja
      limit:
        description: Maximum cards to index
        required: true
        default: "100"
      start_page:
        description: TCGdex start page
        required: true
        default: "1"

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: scripts/requirements-card-index.txt

      - name: Install indexer dependencies
        run: pip install -r scripts/requirements-card-index.txt

      - name: Download image embedding model
        run: |
          curl -fsSL \
            https://storage.googleapis.com/mediapipe-models/image_embedder/mobilenet_v3_small/float32/latest/mobilenet_v3_small.tflite \
            -o /tmp/mobilenet_v3_small.tflite

      - name: Index TCGdex card images
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/index_tcgdex_cards.py \
            --language "${{ inputs.language }}" \
            --limit "${{ inputs.limit }}" \
            --start-page "${{ inputs.start_page }}" \
            --model /tmp/mobilenet_v3_small.tflite
